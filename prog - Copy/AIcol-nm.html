<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Hub</title>
<link rel="stylesheet" type="text/css" href="AIcol-nm.css">
</head>
<body>
<!-- ===== NAVBAR ===== -->
<nav>
  <h1 class="logo" onclick="location.reload(true)">
    <!-- Inline SVG Logo -->
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#1E90FF"/>
          <stop offset="100%" stop-color="#00CED1"/>
        </linearGradient>
      </defs>
      <circle cx="16" cy="16" r="15" fill="url(#grad)"/>
      <text x="16" y="20" font-family="sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">AI</text>
    </svg>
    <span>AI Hub</span>
  </h1>

  <!-- Search + Filters -->
  <div class="filters-container">
<div class="search-container">
  <input type="search" required placeholder=" " id="searchInput" />
  <label>Search AI...</label>
  <span class="icon">⌕</span>
  <span class="scan"></span>
</div>
  <select id="categorySelect">
    <option value="All">All Categories</option>
  </select>
  <select id="pricingSelect">
    <option value="All">All Pricing</option>
    <option value="free">Free</option>
    <option value="free-trial">Free Trial</option>
    <option value="paid">Paid</option>
  </select>
  <select id="ratingSelect">
    <option value="All">All Ratings</option>
    <option value="1">1 Star</option>
    <option value="2">2 Stars</option>
    <option value="3">3 Stars</option>
    <option value="4">4 Stars</option>
    <option value="5">5 Stars</option>
    <option value="6">6 Stars</option>
    <option value="7">7 Stars</option>
    <option value="8">8 Stars</option>
    <option value="9">9 Stars</option>
    <option value="10">10 Stars</option>
  </select>
  <button id="sortRatingsBtn">Sort by Ratings ↓</button>
</div>
</nav>

<div class="container" id="aiContainer"></div>
<script src="AIcol-nm.js"></script>
</body>
</html>
