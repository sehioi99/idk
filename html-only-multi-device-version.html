/* ===== BODY ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111 0%, #222 100%);
  color: #fff;
  transition: background 0.5s ease, color 0.5s ease;
}

/* ===== NAVBAR ===== */
nav {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 2rem;
  padding: 1rem 2rem;
  background: linear-gradient(135deg, #1c1c1c, #2a2a2a);
  background-size: 400% 400%;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  border-bottom: 2px solid #333;
  backdrop-filter: blur(6px);
  animation: navGradientMove 15s linear infinite;
  transition: all 0.4s ease;
}

@keyframes navGradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

nav:hover {
  box-shadow: 0 6px 30px rgba(30,144,255,0.4), 0 0 15px rgba(255,105,180,0.3);
  transform: scale(1.01);
}

nav > div {
  display: flex;
  align-items: center;
  gap: 1rem;
}

/* ===== LOGO + NAME ===== */
nav h1 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0;
  font-size: 1.8rem;
  font-weight: bold;
  cursor: default;
  text-transform: uppercase;
  letter-spacing: 1px;
}

nav h1 span {
  background: linear-gradient(270deg, #1e90ff, #8a2be2, #00ced1, #ff69b4, #1e90ff);
  background-size: 500% 500%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: textGradient 6s ease infinite, textGlow 4s ease-in-out infinite;
  transition: transform 0.3s ease;
}

@keyframes textGlow {
  0%,100% { text-shadow: 0 0 4px #1e90ff, 0 0 6px #8a2be2; }
  50% { text-shadow: 0 0 6px #00ced1, 0 0 10px #ff69b4; }
}

nav h1:hover span {
  animation-play-state: paused;
  transform: scale(1.1);
  filter: drop-shadow(0 0 6px #1e90ff) drop-shadow(0 0 5px #ff69b4);
}

nav h1 svg {
  width: 40px;
  height: 40px;
  transition: transform 0.3s ease, filter 0.3s ease;
  vertical-align: middle;
}

nav h1:hover svg {
  transform: rotate(3deg) scale(1.08);
  filter: drop-shadow(0 0 5px #1e90ff) drop-shadow(0 0 5px #ff69b4);
}

/* ===== SEARCH BAR ===== */
nav .search-container {
  position: relative;
  display: flex;
  align-items: center;
}

nav .search-container input[type="search"] {
  padding: 0.6rem 2.5rem 0.6rem 1rem;
  border-radius: 12px;
  border: 2px solid #444;
  outline: none;
  width: 240px;
  background: #1e1e1e;
  color: #fff;
  font-size: 0.95rem;
  box-shadow: 0 0 6px rgba(0,0,0,0.4);
  transition: all 0.4s ease;
}

nav .search-container input[type="search"]:focus {
  box-shadow: 0 0 14px rgba(30,144,255,0.5), 0 0 8px rgba(255,105,180,0.3);
  background: #262626;
  transform: scale(1.03);
}

nav .search-container input[type="search"]::placeholder {
  color: #aaa;
}

nav .search-container label {
  position: absolute;
  left: 2.5rem;
  font-size: 0.95rem;
  color: #888;
  pointer-events: none;
  transition: all 0.3s ease;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1;
}

nav .search-container input[type="search"]:focus ~ label,
nav .search-container input[type="search"]:not(:placeholder-shown) ~ label {
  display: none;
}

nav .search-container span.icon {
  position: absolute;
  left: 0.8rem;
  font-size: 1rem;
  color: #888;
  pointer-events: none;
  transition: color 0.3s;
  z-index: 2;
}

nav .search-container input[type="search"]:focus ~ span.icon {
  color: #1E90FF;
}

nav .search-container span.scan {
  position: absolute;
  right: 0.8rem;
  width: 16px;
  height: 16px;
  border: 2px solid #888;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
}

/* ===== FILTERS & SORT ===== */
nav select, #sortRatingsBtn {
  padding: 0.55rem 0.8rem;
  border-radius: 10px;
  border: 2px solid #444;
  outline: none;
  background: #2a2a2a;
  color: #fff;
  margin-left: 1rem;
  cursor: pointer;
  font-size: 0.95rem;
  box-shadow: 0 0 4px rgba(0,0,0,0.3);
  transition: all 0.3s ease, border 0.3s ease, background 0.3s ease;
}

nav select:hover, #sortRatingsBtn:hover {
  border: 2px solid #ff69b4;
  background: linear-gradient(135deg, #1e90ff, #ff69b4);
  transform: scale(1.06) rotateZ(0.5deg);
  box-shadow: 0 0 12px rgba(30,144,255,0.5), 0 0 10px rgba(255,105,180,0.4);
}

nav select option {
  background: #2a2a2a;
  color: #fff;
}

/* ===== PRICING BADGES ===== */
.pricing-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 0.3rem 0.6rem;
  border-radius: 5px;
  font-size: 0.75rem;
  font-weight: bold;
  z-index: 3;
}

.pricing-free { background: #22c55e; color: #fff; }
.pricing-trial { background: #8d1df7; color: #fff; }
.pricing-paid { background: #ef4444; color: #fff; }
.pricing-pay-per-use { background: #f59e0b; color: #fff; }

/* ===== CONTAINER GRID ===== */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
  background: linear-gradient(135deg, #111 0%, #1c1c1c 100%);
  transition: background 0.5s ease;
}

/* ===== AI CARD ===== */
.ai-card {
  position: relative;
  background: #222;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
}

.ai-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 22px rgba(255,255,255,0.2);
  background: linear-gradient(135deg, #ff6ec7, #1e90ff, #00ced1);
  background-size: 300% 300%;
  animation: gradientMove 5s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.ai-card h3 {
  margin: 0.5rem 0;
  font-size: 1.1rem;
  color: #fff;
  position: relative;
  z-index: 2;
}

.ai-card-description {
  font-size: 0.85rem;
  color: #ccc;
  margin: 0.5rem 0 0.8rem 0;
  line-height: 1.4;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.3s ease, max-height 0.3s ease;
  position: relative;
  z-index: 2;
}

.ai-card:hover .ai-card-description {
  opacity: 1;
  max-height: 100px;
}

/* ===== STAR ORBITS ===== */
.orbit-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
  opacity: 1;
  transition: opacity 0.35s ease;
  will-change: opacity;
}

.ai-card:hover .orbit-container {
  opacity: 0;
}

.star {
  position: absolute;
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite, float 6s ease-in-out infinite;
}

.star-rating-1  { background: #ff2a2a; opacity: 0.6; filter: blur(0.5px); }
.star-rating-2  { background: #ff527f; opacity: 0.63; filter: blur(0.6px); }
.star-rating-3  { background: #ff7db2; opacity: 0.66; filter: blur(0.7px); }
.star-rating-4  { background: #d37aff; opacity: 0.7; filter: blur(0.9px); }
.star-rating-5  { background: #9b7fff; opacity: 0.73; filter: blur(1px); }
.star-rating-6  { background: #5f79ff; opacity: 0.76; filter: blur(1.1px); }
.star-rating-7  { background: #4c9bff; opacity: 0.8; filter: blur(1.2px); }
.star-rating-8  { background: #4ccfff; opacity: 0.85; filter: blur(1.3px); }
.star-rating-9  { background: #8fefff; opacity: 0.9; filter: blur(1.5px); }
.star-rating-10 { background: #ffffff; opacity: 1; filter: blur(1.7px); }

@keyframes twinkle {
  0%,100% { opacity: 0.9; filter: brightness(1.2); }
  25% { opacity: 0.6; filter: brightness(1); }
  50% { opacity: 1; filter: brightness(1.4); }
  75% { opacity: 0.7; filter: brightness(0.9); }
}

@keyframes float {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(8px,-6px) scale(1.1); }
  50% { transform: translate(-5px,8px) scale(0.95); }
  75% { transform: translate(6px,4px) scale(1.05); }
}

/* ===== RESPONSIVE DESIGN ===== */

/* Tablets (max-width: 1024px) */
@media (max-width: 1024px) {
  nav { flex-wrap: wrap; padding: 1rem; gap: 1rem; }
  nav h1 { font-size: 1.5rem; }
  nav .search-container input[type="search"] { width: 180px; }
  nav select, #sortRatingsBtn { font-size: 0.85rem; padding: 0.45rem 0.7rem; margin-left: 0.5rem; }
  .container { grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 15px; padding: 15px; }
  .ai-card { padding: 15px; }
  .ai-card h3 { font-size: 1rem; }
  .ai-card-description { font-size: 0.8rem; }
}

/* Phones (max-width: 767px) */
@media (max-width: 767px) {
  nav { flex-direction: column; align-items: flex-start; gap: 0.8rem; padding: 0.8rem 1rem; }
  nav h1 { font-size: 1.3rem; }
  nav .search-container input[type="search"] { width: 100%; padding: 0.5rem 2rem 0.5rem 1rem; }
  nav > div { width: 100%; justify-content: space-between; margin-left: 0; flex-wrap: wrap; }
  nav select, #sortRatingsBtn { width: 48%; font-size: 0.8rem; margin: 0.3rem 0; }
  .container { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 12px; padding: 12px; }
  .ai-card { padding: 12px; }
  .ai-card h3 { font-size: 0.95rem; }
  .ai-card-description { font-size: 0.75rem; }

  /* Keep stars visible on phones, scale down slightly */
  .orbit-container {
    transform: scale(0.6);
    opacity: 0.7;
    pointer-events: none;
  }
}

/* Tiny phones (max-width: 480px) */
@media (max-width: 480px) {
  nav h1 { font-size: 1.1rem; }
  nav .search-container input[type="search"] { font-size: 0.85rem; }
  .ai-card h3 { font-size: 0.9rem; }
  .ai-card-description { font-size: 0.7rem; }
  .orbit-container { transform: scale(0.5); opacity: 0.6; }
}

/* ===== NAV TOGGLE BUTTON ===== */
#toggleNavBtn {
  position: fixed;
  top: 1%;
  right: 1%;
  width: 48px;

}

#toggleNavBtn:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 18px rgba(30,144,255,0.6), 0 0 10px rgba(255,105,180,0.4);
}
</style>

// --- DOM Elements ---
const container = document.getElementById("aiContainer");
const searchInput = document.getElementById("searchInput");
const categorySelect = document.getElementById("categorySelect");
const pricingSelect = document.getElementById("pricingSelect");
const ratingSelect = document.getElementById("ratingSelect");
const sortRatingsBtn = document.getElementById("sortRatingsBtn");

// --- Populate Category Dropdown ---
const categories = Array.from(new Set(aiList.map(ai => ai.category))).sort();
categories.forEach(cat => {
  const option = document.createElement("option");
  option.value = cat;
  option.textContent = cat;
  categorySelect.appendChild(option);
});

// --- Sorting Toggle ---
let sortDescending = true;
sortRatingsBtn.addEventListener("click", () => {
  sortDescending = !sortDescending;
  sortRatingsBtn.textContent = sortDescending ? "Sort by Ratings ↓" : "Sort by Ratings ↑";
  applyFilters();
});

// --- Apply Filters Function ---
function applyFilters() {
  const searchText = searchInput.value.toLowerCase();
  const selectedCategory = categorySelect.value;
  const selectedPricing = pricingSelect.value;
  const selectedRating = ratingSelect.value;

  container.innerHTML = "";

  let filteredAIs = aiList.filter(ai => {
    const matchesSearch = ai.name.toLowerCase().includes(searchText);
    const matchesCategory = selectedCategory === "All" || ai.category === selectedCategory;
    const matchesPricing = selectedPricing === "All" || ai.pricing === selectedPricing;
    const matchesRating = selectedRating === "All" || ai.stars === parseInt(selectedRating);
    return matchesSearch && matchesCategory && matchesPricing && matchesRating;
  });

  // --- Sort by Ratings ---
  filteredAIs.sort((a, b) => sortDescending ? b.stars - a.stars : a.stars - b.stars);

  filteredAIs.forEach(ai => {
    const card = document.createElement("div");
    card.className = "ai-card";

    const pricingLabel = ai.pricing === "free" ? "FREE" : ai.pricing === "free-trial" ? "TRIAL" : "PAID";
    const pricingClass = `pricing-${ai.pricing}`;

    card.innerHTML = `
      <div class="pricing-badge ${pricingClass}">${pricingLabel}</div>
      <div style="font-size: 3rem; margin: 0.5rem 0;">${ai.logo}</div>
      <h3>${ai.name}</h3>
      <p class="ai-card-description">${ai.description}</p>
      <div class="orbit-container"></div>
    `;

    const orbitContainer = card.querySelector(".orbit-container");

    for (let i = 0; i < ai.stars; i++) {
      const star = document.createElement("div");
      star.className = "star";
      star.classList.add(`star-rating-${ai.stars}`);

      const randomX = Math.random() * 80 + 10;
      const randomY = Math.random() * 80 + 10;

      star.style.left = `${randomX}%`;
      star.style.top = `${randomY}%`;

      const starSize = 8 + Math.random() * 6;
      star.style.width = `${starSize}px`;
      star.style.height = `${starSize}px`;
      star.style.transform = "translate(-50%, -50%)";

      star.style.animationDuration = `${2 + Math.random() * 2}s, ${5 + Math.random() * 3}s`;
      star.style.animationDelay = `${i * 0.3}s, ${-i * 0.5}s`;

      orbitContainer.appendChild(star);
    }

    card.addEventListener("click", () => window.open(ai.url, "_blank"));
    container.appendChild(card);
  });
}

// --- Event Listeners ---
searchInput.addEventListener("input", applyFilters);
categorySelect.addEventListener("change", applyFilters);
pricingSelect.addEventListener("change", applyFilters);
ratingSelect.addEventListener("change", applyFilters);

// --- Initial Render ---
applyFilters();


const toggleBtn = document.getElementById('toggleNavBtn');
const nav = document.querySelector('nav');

toggleBtn.addEventListener('click', () => {
  if (nav.style.display === 'none') {
    nav.style.display = 'flex';
    toggleBtn.textContent = '≡'; // button icon when nav is visible
  } else {
    nav.style.display = 'none';
    toggleBtn.textContent = '🡇'; // button icon when nav is hidden
  }
});
</script>
